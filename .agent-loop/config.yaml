# Target-local config for running the loop on this repository itself.
# Discovered automatically (before configs/default.yaml) when no --config is given.

project:
  name: agent-loop-orchestrator
  use_worktree: false

verification:
  timeout_seconds: 300
  commands:
    # The verifier runs without a shell and resolves argv[0] via PATH
    # (shutil.which); bare `pytest` is not on the orchestrator's PATH, so use
    # the repo venv's python explicitly.
    - C:\Users\alber\Documents\dev\agent-loop-orchestrator\.venv\Scripts\python.exe -m pytest -q
    - C:\Users\alber\Documents\dev\agent-loop-orchestrator\.venv\Scripts\python.exe -m ruff check .
    - git diff --check

project_context:
  rules:
    - The README adapts to the code, never the reverse.
    - Do not enable real Claude or Codex execution in automated tests.
