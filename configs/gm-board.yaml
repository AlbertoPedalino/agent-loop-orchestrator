# GM-Board target settings. The repository has no package manifest or test
# script, so use Git's read-only whitespace check as a minimal verification guard.
project:
  name: gm-board
  use_worktree: true

project_context:
  data_sources:
    data_repo: "https://github.com/5etools-mirror-3/5etools-src/tree/main/data"
    image_repo: "https://github.com/5etools-mirror-2/5etools-img"
  allowed_sources:
    - XPHB
    - XMM
    - XDMG
    - FRAIF
    - FRHOF
    - EFA
    - RWH
  rules:
    - "GM-Board fetches D&D data at runtime from the configured 5etools data repository."
    - "GM-Board resolves images/assets from the configured 5etools image repository."
    - "Only D&D 5.5e / 2024 source codes are allowed: XPHB, XMM, XDMG, FRAIF, FRHOF, EFA, RWH."
    - "Ignore or reject any source outside the whitelist."
    - "Do not use legacy 2014 sources such as PHB, DMG, MM unless explicitly mapped to an allowed 2024 source code."
    - "Do not use homebrew, unofficial sources, or non-whitelisted sources."
    - "Do not copy, vendor, or commit 5etools JSON files or image assets into GM-Board."
    - "Preserve runtime fetching behavior; do not replace it with local vendored copies."

backend:
  type: cli

git:
  remote: origin
  base_branch: feature/unified-character-storage
  agent_branch: agent/apply-orchestrator-feature-unified-character-storage
  worktree_root: ../agent-worktrees
  require_clean_repo: false
  delete_worktree_on_success: false
  delete_worktree_on_failure: false

limits:
  max_fix_attempts: 2
  max_changed_files: 12
  max_turns_plan: 6
  max_turns_implement: 12
  max_turns_fix: 8
  max_turns_review: 6
  max_budget_usd: 2.0

verification:
  timeout_seconds: 120
  commands:
    - git diff --check

blocked_commands:
  - git push
  - git commit
  - rm -rf
  - npm publish
  - pnpm publish
  - yarn publish
  - docker compose down -v
  - jupyter nbconvert --execute
  - wandb sweep
  - wandb agent

rules:
  - Do not push.
  - Do not commit.
  - Do not modify protected branches.
  - Prefer minimal changes.
  - Prefer project-local tests after confirming package manager configuration.
