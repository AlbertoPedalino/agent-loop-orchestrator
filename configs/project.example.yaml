# Copy this file and adjust it for the target repository.
project:
  name: example-service
  use_worktree: true

limits:
  max_fix_attempts: 2
  max_changed_files: 5
  phase_timeout_seconds: 600
  # max_budget_usd: set only when billing through the Anthropic API; leave unset
  # on a Claude subscription (Pro/Plus/Max).

verification:
  commands:
    - pytest -q tests/unit

blocked_commands:
  - git push
  - git commit
  - rm -rf
  - docker compose down -v

rules:
  - Do not modify production configuration.
  - Prefer tests under tests/unit.
  - Keep changes limited to the requested feature.
