# Copy this file and adjust it for the target repository.
project:
  name: example-service
  use_worktree: true

agent:
  provider: claude        # claude | codex

backend:
  type: cli               # local CLI only; no API/SDK backend

limits:
  max_fix_attempts: 2
  max_changed_files: 5
  phase_timeout_seconds: 600
  # max_budget_usd is intentionally unsupported in subscription CLI mode.

verification:
  commands:
    - pytest -q tests/unit

blocked_commands:
  - git push
  - git commit
  - rm -rf
  - docker compose down -v

rules:
  - Do not modify production configuration.
  - Prefer tests under tests/unit.
  - Keep changes limited to the requested feature.
