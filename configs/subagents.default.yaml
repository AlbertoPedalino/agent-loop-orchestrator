subagents:
  planner:
    description: "Read-only planning agent."
    allowed_tools:
      - Read
      - Grep
      - Glob
    max_turns: 6
    prompt_template: prompts/planner.md
    # No write tools -> read-only; runs without an edit permission mode.

  implementer:
    description: "Code editing agent."
    allowed_tools:
      - Read
      - Edit
      - MultiEdit
      - Bash
      - Grep
      - Glob
    max_turns: 12
    prompt_template: prompts/implementer.md
    # Auto-accept edits so the headless CLI can apply changes; blocked
    # commands are still denied at the tool boundary.
    permission_mode: acceptEdits

  fixer:
    description: "Test failure fixing agent."
    allowed_tools:
      - Read
      - Edit
      - MultiEdit
      - Bash
      - Grep
      - Glob
    max_turns: 8
    prompt_template: prompts/fixer.md
    permission_mode: acceptEdits

  reviewer:
    description: "Read-only review agent."
    allowed_tools:
      - Read
      - Grep
      - Glob
    max_turns: 6
    prompt_template: prompts/reviewer.md
    # No write tools -> read-only; runs without an edit permission mode.
