project:
  name: default
  use_worktree: false

backend:
  type: cli

git:
  remote: origin
  base_branch: main
  branch_prefix: agent/
  branch_mode: none          # worktree | in_place | none
  create_branch: auto        # auto | always | never (in-place only)
  allow_dirty: false         # permit switching branches with a dirty work tree
  worktree_root: ../agent-worktrees
  require_clean_repo: false
  delete_worktree_on_success: false
  delete_worktree_on_failure: false

limits:
  max_fix_attempts: 3
  max_changed_files: 8
  phase_timeout_seconds: 600   # per-phase backend timeout
  # max_budget_usd: API-billing dollar cap (--max-budget-usd). Leave UNSET on a
  # Claude subscription (Pro/Plus/Max): there is no per-dollar billing, so a cap
  # only stops a phase early at a phantom cost. Your real limit is the plan's
  # usage window. Set it only when billing through the Anthropic API.
  # max_budget_usd: 5.0
  # Per-phase turn caps live in configs/subagents.default.yaml (max_turns).

memory:
  enabled: true                 # inject + update accumulated project knowledge
  file: .agent-loop/memory.md   # path relative to the target repository root

verification:
  timeout_seconds: 120
  commands:
    - pytest -q

blocked_commands:
  - git push
  - git commit
  - rm -rf
  - wandb sweep
  - wandb agent
  - jupyter nbconvert --execute
  - docker compose down -v

rules:
  - Do not run long training jobs.
  - Do not launch W&B sweeps.
  - Do not execute full notebooks.
  - Prefer targeted tests.
  - Prefer minimal changes.
