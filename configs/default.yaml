project:
  name: default
  use_worktree: false

agent:
  provider: claude        # claude | codex

backend:
  type: cli               # cli = subscription-authenticated CLI
                          # api = same local CLI billed via API key
                          #       (ANTHROPIC_API_KEY / OPENAI_API_KEY from the
                          #       environment or the orchestrator .env)

git:
  remote: origin
  base_branch: main
  branch_prefix: agent/
  branch_mode: none          # worktree | in_place | none
  create_branch: auto        # auto | always | never (in-place only)
  allow_dirty: false         # permit switching branches with a dirty work tree
  worktree_root: ../agent-worktrees
  require_clean_repo: false
  delete_worktree_on_success: false  # remove clean worktrees created by the run
  delete_worktree_on_failure: false  # remove clean worktrees created by the run

limits:
  max_fix_attempts: 3
  max_changed_files: 8
  phase_timeout_seconds: 600   # per-phase CLI timeout
  # max_budget_usd is supported only with backend: api and agent: claude.
  # Per-phase turn caps live in configs/subagents.default.yaml (max_turns).

memory:
  enabled: true                 # inject + update accumulated project knowledge
  file: .agent-loop/memory.md   # path relative to the target repository root
  history: true                 # record run outcomes and inject recent ones
  history_file: .agent-loop/history.jsonl

verification:
  timeout_seconds: 120
  commands:
    - pytest -q

blocked_commands:
  - git push
  - git commit
  - rm -rf
  - wandb sweep
  - wandb agent
  - jupyter nbconvert --execute
  - docker compose down -v

rules:
  - Do not run long training jobs.
  - Do not launch W&B sweeps.
  - Do not execute full notebooks.
  - Prefer targeted tests.
  - Prefer minimal changes.

# Optional custom hooks: external commands run at fixed orchestration points.
# pre_* hooks are gates (non-zero exit aborts the phase/command); post_* hooks
# are informational (failures are logged, never change the outcome). Context
# arrives via AGENT_LOOP_* environment variables (EVENT, REPO, PHASE, AGENT,
# BACKEND, STATUS, OUTPUT_LENGTH, COMMAND, RETURN_CODE). Hook commands run
# without a shell and obey blocked_commands.
# hooks:
#   pre_phase:
#     - command: python scripts/guard.py
#       timeout_seconds: 30
#   post_phase:
#     - python scripts/notify.py
