subagents:
  planner:
    description: "Read-only planning agent."
    allowed_tools:
      - Read
      - Grep
      - Glob
    prompt_template: prompts/planner.md

  implementer:
    description: "Code editing agent."
    allowed_tools:
      - Read
      - Edit
      - MultiEdit
      - Bash
      - Grep
      - Glob
    prompt_template: prompts/implementer.md
    permission_mode: acceptEdits

  fixer:
    description: "Test failure fixing agent."
    allowed_tools:
      - Read
      - Edit
      - MultiEdit
      - Bash
      - Grep
      - Glob
    prompt_template: prompts/fixer.md
    permission_mode: acceptEdits

  reviewer:
    description: "Read-only review agent."
    allowed_tools:
      - Read
      - Grep
      - Glob
    prompt_template: prompts/reviewer.md
