project:
  name: default
  use_worktree: false

agent:
  provider: claude

backend:
  type: cli

git:
  remote: origin
  base_branch: main
  branch_prefix: agent/
  branch_mode: none
  create_branch: auto
  allow_dirty: false
  worktree_root: ../agent-worktrees
  require_clean_repo: false
  delete_worktree_on_success: false
  delete_worktree_on_failure: false
  commit_on_success: false

limits:
  max_fix_attempts: 3
  max_changed_files: 8
  phase_timeout_seconds: 600

testing:
  policy: optional
  paths:
    - tests/**
    - test_*.py
    - "**/test_*.py"
    - "**/*_test.py"
  forbid_test_deletion: false

memory:
  enabled: true
  file: .agent-loop/memory.md
  history: true
  history_file: .agent-loop/history.jsonl

verification:
  timeout_seconds: 120
  commands:
    - pytest -q

blocked_commands:
  - git push
  - git commit
  - rm -rf
  - wandb sweep
  - wandb agent
  - jupyter nbconvert --execute
  - docker compose down -v

rules:
  - Do not run long training jobs.
  - Do not launch W&B sweeps.
  - Do not execute full notebooks.
  - Prefer targeted tests.
  - Prefer minimal changes.
